<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Página Única</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
        }
        
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }
        
        header h1 {
            font-size: 2.5rem;
        }
        
        main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        
        h2 {
            margin-top: 2rem;
            margin-bottom: 1rem;
            color: #667eea;
        }
        
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .gallery img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }
        
        .gallery img:hover {
            transform: scale(1.05);
        }
        
        ul {
            list-style: none;
            background: #f5f5f5;
            padding: 1.5rem;
            border-radius: 8px;
        }
        
        ul li {
            padding: 0.8rem;
            border-bottom: 1px solid #ddd;
        }
        
        ul li:last-child {
            border-bottom: none;
        }
        
        ul li:before {
            content: "✓ ";
            color: #667eea;
            font-weight: bold;
            margin-right: 0.5rem;
        }
        
        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 1.5rem;
            margin-top: 3rem;
        }
        
        footer a {
            color: #667eea;
            text-decoration: none;
        }
        
        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <h1>Bienvenido a mi sitio web</h1>
    </header>

    <main>
        <h2>Galería de Imágenes</h2>
        <div class="gallery">
            <img src="https://images.unsplash.com/photo-1505228395891-9a51e7e86e81?w=400&h=300&fit=crop" alt="Montañas al atardecer" width="300">
            <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&h=300&fit=crop" alt="Océano tranquilo" width="300">
            <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=400&h=300&fit=crop" alt="Bosque verde" width="300">
        </div>

        <h2>Lista de Recursos</h2>
        <ul>
            <li>Openverse</li>
            <li>Unsplash</li>
            <li>Pixabay</li>
        </ul>
    </main>

    <footer>
        <p>Visita <a href="https://www.unsplash.com" target="_blank">Unsplash</a> para más imágenes.</p>
    </footer>
</body>
</html>
